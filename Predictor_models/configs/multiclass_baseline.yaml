project:
  name: predictor_cancer_rectal_multiclase
  random_seed: 42

paths:
  dataset_root: Predictor_models/data/imagenes_cancer
  artifacts_root: Predictor_models/artifacts
  manifests_dir: Predictor_models/artifacts/manifests
  reports_dir: Predictor_models/artifacts/reports
  figures_dir: Predictor_models/artifacts/figures
  checkpoints_dir: Predictor_models/artifacts/checkpoints
  metrics_dir: Predictor_models/artifacts/metrics

dataset:
  mode: multiclass
  image_size: 224
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  extensions:
    - .jpg
    - .jpeg
    - .png
  classes:
    polipo:
      - Polipos/polyps
      - Polipos/imagenes con polipos destacados/output/original
    sano:
      - Casos_negativos
    otras_patologias:
      - Sangre_Paredes
  external_eval_sources: {}

preprocessing:
  bottom_left_mask:
    enabled: true
    width_ratio: 0.30
    height_ratio: 0.35
    fill: 0

training:
  batch_size: 16
  epochs: 10
  num_workers: 0
  learning_rate: 0.0003
  weight_decay: 0.0001
  early_stopping_patience: 3
  mixed_precision: false
  positive_class_name: polipo
  primary_metric: f1_macro

models:
  baseline: efficientnet_b0
  candidates:
    - resnet50
    - efficientnet_b0
    - densenet121

logging:
  experiment_name: baseline_multiclase
