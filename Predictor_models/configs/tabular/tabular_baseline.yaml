project:
  name: predictor_cancer_rectal_tabular
  random_seed: 42

paths:
  dataset_root: Predictor_models/data
  artifacts_root: Predictor_models/artifacts/tabular
  manifests_dir: Predictor_models/artifacts/tabular/manifests
  reports_dir: Predictor_models/artifacts/tabular/reports
  figures_dir: Predictor_models/artifacts/tabular/figures
  checkpoints_dir: Predictor_models/artifacts/tabular/checkpoints
  metrics_dir: Predictor_models/artifacts/tabular/metrics

dataset:
  data_csv: Predictor_models/data/cancer_final.csv
  questions_csv: Predictor_models/data/Preguntas OncolÃ³gicas para Pacientes - Preguntas OncolÃ³gicas para Pacientes.csv
  csv_separator: ";"
  csv_encoding: latin1
  question_encoding: utf-8
  target_column: cancer_diagnosis
  target_mapping:
    "no": 0
    "yes": 1
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  id_column: id
  feature_columns:
    - age
    - sex
    - sof
    - alcohol
    - tobacco
    - diabetes
    - tenesmus
    - previous_rt
    - rectorrhagia
    - intestinal_habit
    - digestive_family_history
  binary_columns:
    - sof
    - diabetes
    - tenesmus
    - previous_rt
    - rectorrhagia
  ordinal_columns:
    - alcohol
    - tobacco
    - intestinal_habit

training:
  positive_class_name: riesgo_clinico
  primary_metric: f1_positive
  cv_folds: 5
  search_iterations: 10
  search_scoring: f1
  refit_scoring: f1

calibration:
  enabled: true
  method: sigmoid

models:
  baseline: xgboost
  candidates:
    - random_forest
    - xgboost
  random_forest:
    n_estimators: 400
    max_depth: 12
    min_samples_split: 8
    min_samples_leaf: 2
    random_state: 42
    class_weight: balanced
    n_jobs: 1
    search_space:
      n_estimators:
        - 200
        - 300
        - 400
        - 500
      max_depth:
        - 8
        - 10
        - 12
        - 16
        - null
      min_samples_split:
        - 4
        - 8
        - 12
      min_samples_leaf:
        - 1
        - 2
        - 4
  xgboost:
    n_estimators: 300
    max_depth: 4
    learning_rate: 0.05
    subsample: 0.9
    colsample_bytree: 0.9
    reg_lambda: 1.0
    random_state: 42
    search_space:
      n_estimators:
        - 200
        - 300
        - 400
      max_depth:
        - 3
        - 4
        - 5
        - 6
      learning_rate:
        - 0.03
        - 0.05
        - 0.08
      subsample:
        - 0.8
        - 0.9
        - 1.0
      colsample_bytree:
        - 0.8
        - 0.9
        - 1.0
      reg_lambda:
        - 0.5
        - 1.0
        - 2.0

logging:
  experiment_name: baseline_tabular
