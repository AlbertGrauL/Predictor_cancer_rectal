[pytest]
testpaths = tests
python_files = test_*.py
addopts =
    -p no:cacheprovider
    --basetemp=.pytest_tmp
    --cov=Predictor_api.main
    --cov=Predictor_models.pipeline.v1_expert_binary.config
    --cov=Predictor_models.pipeline.v1_expert_binary.metrics
    --cov=Predictor_models.pipeline.v1_expert_binary.utils
    --cov=Predictor_models.pipeline.v1_expert_binary.transforms
    --cov=Predictor_models.pipeline.v1_expert_binary.inference
    --cov=Predictor_models.pipeline.v2_multiclass.tabular.tabular_utils
    --cov=Predictor_models.pipeline.v2_multiclass.tabular.tabular_inference
    --cov=Predictor_models.pipeline.v2_multiclass.tabular.prepare_tabular_data
    --cov=Predictor_models.pipeline.v2_multiclass.tabular.audit_tabular_data
    --cov=Predictor_models.pipeline.v2_multiclass.tabular.summarize_tabular_experiments
    --cov=Predictor_models.pipeline.v2_multiclass.tabular.run_tabular_model_comparison
    --cov-report=term-missing
